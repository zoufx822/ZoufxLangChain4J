server:
  port: 8080

logging:
  level:
    root: INFO

spring:
  profiles:
    active: local
  ai:
    anthropic:
      base-url: https://api.minimaxi.com/anthropic/v1
      # API key 在 application-local.yml 中配置（不上传 GitHub）
      api-key: ${MINIMAX_API_KEY:}
      version: 2023-06-01
      chat:
        options:
          model: MiniMax-M2.5
          max-tokens: 16384
          thinking:
            type: enabled
            budget-tokens: 8192

langchain4j:
  web-search:
    enabled: true
    tavily:
      # 生产环境通过环境变量 TAVILY_API_KEY 注入；空值时自动降级关闭（不阻塞启动）
      api-key: ${TAVILY_API_KEY:}
      search-depth: basic      # basic / advanced
      include-answer: true
      max-results: 5
      timeout: 20s
